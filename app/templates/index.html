<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRE CRM</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-api-prefix="{{ api_prefix }}">
    <header class="topbar">
      <div>
        <h1>CRE CRM Platform</h1>
        <p>Коммерческая недвижимость: фаза 1.2/1.3</p>
      </div>
      <div class="userbox">
        <div id="currentUserInfo"></div>
        <button id="logoutBtn" class="secondary">Выйти</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <button class="tab-btn active" data-tab="home">Главная</button>
        <button class="tab-btn" data-tab="leads">Лиды</button>
        <button class="tab-btn" data-tab="deals">Сделки</button>
        <button class="tab-btn" data-tab="parser">Parser Hub</button>
        <button class="tab-btn" data-tab="users" id="usersTabBtn">Пользователи</button>
      </aside>

      <main class="content">
        <section class="tab active" id="tab-home">
          <h2>Главная</h2>
          <div class="cards" id="dashboardCards"></div>
          <div class="split">
            <div class="panel">
              <h3>Лиды по статусам</h3>
              <div id="leadStatusSummary" class="status-list"></div>
            </div>
            <div class="panel">
              <h3>Сделки по статусам</h3>
              <div id="dealStatusSummary" class="status-list"></div>
            </div>
          </div>
        </section>

        <section class="tab" id="tab-leads">
          <div class="tab-title">
            <h2>Лиды - Канбан</h2>
            <button id="refreshLeadsBtn" class="secondary">Обновить</button>
          </div>
          <div class="kanban" id="leadKanban"></div>
        </section>

        <section class="tab" id="tab-deals">
          <div class="tab-title">
            <h2>Сделки - Канбан</h2>
            <button id="refreshDealsBtn" class="secondary">Обновить</button>
          </div>
          <div class="kanban" id="dealKanban"></div>
        </section>

        <section class="tab" id="tab-parser">
          <h2>Parser Hub</h2>
          <form id="ingestForm" class="grid">
            <label>Канал
              <select name="source_channel" required>
                <option value="avito">avito</option>
                <option value="cian">cian</option>
                <option value="domclick">domclick</option>
                <option value="telegram">telegram</option>
              </select>
            </label>
            <label>Заголовок
              <input name="title" required minlength="3" />
            </label>
            <label>Адрес
              <input name="normalized_address" />
            </label>
            <label>Город
              <input name="city" value="Ижевск" />
            </label>
            <label>Площадь (м2)
              <input name="area_sqm" type="number" min="0" step="0.1" />
            </label>
            <label>Цена (руб)
              <input name="price_rub" type="number" min="0" step="1" />
            </label>
            <label>Телефон
              <input name="contact_phone" />
            </label>
            <label>Контакт
              <input name="contact_name" />
            </label>
            <label>Интент
              <select name="intent">
                <option value="seller">seller</option>
                <option value="tenant">tenant</option>
                <option value="investor">investor</option>
                <option value="unknown">unknown</option>
              </select>
            </label>
            <button type="submit">Добавить в Parser Hub</button>
          </form>

          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Канал</th>
                <th>Статус</th>
                <th>Объект</th>
                <th>Контакт</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="parserRows"></tbody>
          </table>
        </section>

        <section class="tab" id="tab-users">
          <h2>Пользователи</h2>
          <form id="newUserForm" class="grid">
            <label>Email
              <input type="email" name="email" required />
            </label>
            <label>ФИО
              <input name="full_name" minlength="3" required />
            </label>
            <label>Телефон
              <input name="phone" />
            </label>
            <label>Роль
              <select name="role">
                <option value="call_center">call_center</option>
                <option value="sales">sales</option>
                <option value="agent">agent</option>
                <option value="manager">manager</option>
                <option value="admin">admin</option>
              </select>
            </label>
            <label>Пароль
              <input name="password" type="password" minlength="8" required />
            </label>
            <button type="submit">Добавить пользователя</button>
          </form>

          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>ФИО</th>
                <th>Email</th>
                <th>Роль</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="userRows"></tbody>
          </table>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
