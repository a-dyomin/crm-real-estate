<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход - CRE CRM</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-api-prefix="{{ api_prefix }}" class="login-page">
    <main class="login-card">
      <h1>Вход в CRE CRM</h1>
      <p>Регистрация отключена. Доступ выдаёт администратор.</p>
      <form id="loginForm" class="grid single">
        <label>Email
          <input type="email" name="email" required />
        </label>
        <label>Пароль
          <input type="password" name="password" minlength="8" required />
        </label>
        <button type="submit">Войти</button>
      </form>
      <div class="hint">
        Демо-админ: <code>admin@crecrm.app</code> / <code>admin123</code>
      </div>
      <div id="loginError" class="error"></div>
    </main>

    <script src="/static/login.js"></script>
  </body>
</html>
